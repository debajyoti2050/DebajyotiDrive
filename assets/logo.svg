<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="160" fill="white"/>
  
  <!-- Icon Container (centered vertically and positioned left) -->
  <g transform="translate(40, 20)">
    <!-- Folder icon -->
    <g>
      <!-- Folder body -->
      <rect x="0" y="28" width="80" height="92" rx="6" fill="#0f3460" opacity="0.1" stroke="#0f3460" stroke-width="2"/>
      
      <!-- Folder tab -->
      <rect x="0" y="20" width="36" height="12" rx="2" fill="#0f3460" opacity="0.08" stroke="#0f3460" stroke-width="2"/>
      
      <!-- Main folder edge -->
      <path d="M0 28 L36 20 L36 32 L0 40 Z" fill="#0f3460" opacity="0.15"/>
      
      <!-- Cloud icon inside (represents S3) -->
      <g transform="translate(20, 45)">
        <path d="M8 12 Q2 12 0 8 Q0 4 4 2 Q6 0 10 0 Q12 0 14 2 Q18 0 20 4 Q22 2 24 4 Q24 8 20 10 Q18 12 14 12 Z" fill="#16a34a" stroke="#16a34a" stroke-width="1.5"/>
      </g>
      
      <!-- Dollar sign accent -->
      <g transform="translate(50, 58)">
        <circle cx="0" cy="0" r="11" fill="#16a34a" opacity="0.2"/>
        <text x="-3.5" y="4.5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#16a34a">$</text>
      </g>
    </g>
  </g>
  
  <!-- Text - properly aligned -->
  <text x="150" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#0f3460">S3Drive</text>
  <text x="150" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#64748b">Pay-as-you-go cloud storage</text>
  <text x="150" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#94a3b8">Google Drive alternative powered by AWS S3</text>
</svg>
