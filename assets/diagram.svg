<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <style>
    .box { fill:#f7fbff; stroke:#cfe9ff; stroke-width:2; rx:8; }
    .text { font-family: Inter, Arial, sans-serif; fill:#09314a; }
    .muted { fill:#4b6b7a; font-size:12px }
    .title { font-size:16px; font-weight:600 }
  </style>
  <rect width="100%" height="100%" fill="white"/>
  <g transform="translate(40,30)">
    <rect x="0" y="0" width="220" height="120" class="box"/>
    <text x="16" y="28" class="text title">Desktop Client</text>
    <text x="16" y="52" class="muted">Electron + React UI</text>
    <text x="16" y="70" class="muted">Per-upload storage class</text>
    <text x="16" y="88" class="muted">Pre-signed sharing</text>

    <rect x="340" y="0" width="220" height="120" class="box"/>
    <text x="356" y="28" class="text title">S3 Storage</text>
    <text x="356" y="52" class="muted">Pay-as-you-go object storage</text>
    <text x="356" y="70" class="muted">Lifecycle & archive tiers</text>
    <text x="356" y="88" class="muted">High durability</text>

    <rect x="680" y="0" width="120" height="120" class="box"/>
    <text x="692" y="28" class="text title">Billing</text>
    <text x="692" y="52" class="muted">Storage + requests + egress</text>
    <text x="692" y="70" class="muted">True pay-as-you-go</text>

    <g stroke="#2b8fd6" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8fd6" />
        </marker>
      </defs>
      <path d="M140 60 L340 60"/>
      <path d="M560 60 L680 60"/>
    </g>

    <text x="270" y="-4" class="muted" font-size="13">S3-backed Google Drive alternative — choose cost profile per upload</text>
    <rect x="0" y="160" width="560" height="140" rx="8" fill="#fff6e6" stroke="#ffe2a8"/>
    <text x="16" y="186" class="text title">Pay-as-you-go model</text>
    <text x="16" y="210" class="muted">You pay for exactly the storage and requests used — no subscription, no hidden tiers.</text>
    <text x="16" y="234" class="muted">Example: Archive seldom-accessed project folders into Glacier to save cost.</text>
  </g>
</svg>
