<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Inner subtle ring -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(196,181,253,0.18)" stroke-width="6"/>

  <!-- Ambient inner glow top -->
  <ellipse cx="256" cy="120" rx="160" ry="80" fill="rgba(167,139,250,0.12)"/>

  <!-- Cloud body -->
  <path
    d="M128 332a76 76 0 0 1 9-150 106 106 0 0 1 204 30 58 58 0 1 1 3 120H128z"
    fill="url(#cloud)"
    filter="url(#glow)"
  />

  <!-- Upload arrow shaft -->
  <path d="M256 408v-114" stroke="#7c3aed" stroke-width="28" stroke-linecap="round"/>
  <!-- Upload arrow head -->
  <path d="M204 332l52-60 52 60" stroke="#7c3aed" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S3 badge pill -->
  <rect x="318" y="358" width="120" height="72" rx="20" fill="url(#badge)" filter="url(#shadow)"/>
  <rect x="318" y="358" width="120" height="72" rx="20" fill="none" stroke="rgba(196,181,253,0.35)" stroke-width="2.5"/>
  <text x="378" y="408" text-anchor="middle" fill="#e9d5ff" font-size="38" font-weight="800" font-family="ui-monospace,SF Mono,Consolas,monospace" letter-spacing="-1">S3</text>
</svg>
